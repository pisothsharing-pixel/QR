<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic QR Generator</title>
<link rel="Icon" type="imag/png" href="Anime.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* Futuristic background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
}

/* glowing background */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:linear-gradient(45deg,#00ffff,#ff00ff);
filter:blur(120px);
opacity:0.3;
animation:float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(-40px);}
to{transform:translateY(40px);}
}

/* glass container */

.container{
position:relative;
width:360px;
padding:40px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,255,255,0.2);
text-align:center;
}

/* title */

h1{
margin-bottom:25px;
font-size:26px;
letter-spacing:1px;
}

/* input */

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:14px;
margin-bottom:15px;
}

input::placeholder{
color:#ccc;
}

/* neon button */

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffff,#0080ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* QR code */

#qrcode{
margin-top:25px;
display:flex;
justify-content:center;
}

/* back link */

a{
display:inline-block;
margin-top:25px;
color:#00ffff;
text-decoration:none;
font-size:14px;
}

a:hover{
text-shadow:0 0 10px #00ffff;
}

</style>
</head>

<body>

<div class="container">

<h1>QR Code Generator</h1>

<input id="text" placeholder="Paste link here...">

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

<a href="Page.html">⬅ Back Home</a>
<script src="script.js"></script>

</div>



</body>
</html>
